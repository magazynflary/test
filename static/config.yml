# Decap CMS Configuration
# Documentation: https://decapcms.org/docs/

backend:
  name: git-gateway
  repo: drlzin/test
  branch: master
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/32054268-d9b6-40e8-94cf-38dba49564d4/pkce
  auth_token_endpoint: /sites/32054268-d9b6-40e8-94cf-38dba49564d4/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (beware of potential email leak if changed).
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://drlzin.github.io/test

# run: `make hugo-cms`
local_backend: true

# (draft -> review -> publish)
publish_mode: editorial_workflow

# Media files
media_folder: "assets/images/uploads"
public_folder: "images/uploads"

collections:
  # Blog Posts
  - name: "posts"
    label: "Artykuły"
    folder: "content/artykuly"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["date", "title", "edition"]
    view_groups:
      - {label: "Wydanie", field: "edition"}
    editor:
      preview: true
    fields:
      - {label: "Tytuł", name: "title", widget: "string"}
      - {label: "Data publikacji", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss"}
      - {label: "Wersja robocza", name: "draft", widget: "boolean", default: false}
      - {label: "Autor", name: "author", widget: "relation", collection: "authors", search_fields: ["name"], value_field: "{{slug}}", display_fields: ["name"], required: false}
      - {label: "Kategorie", name: "categories", widget: "list", required: false}
      - {label: "Tagi", name: "tags", widget: "list", required: false, hint: "rozdzielone przecinkiem, np.: 'historia, polityka'"}
      - {label: "Obrazek wyróżniający", name: "image", widget: "image", required: false}
      - {label: "Kadrowanie obrazka wyróżniającego", name: "image_focus", widget: "focal-point", default: "50% 50%", required: false}
      - {label: "Opis dla wyszukiwarek", name: "description", widget: "text", required: false}
      - {label: "Wydanie", name: "edition", widget: "relation", collection: "editions", value_field: "{{slug}}", search_fields: ["title"], display_fields: ["date", "title"], required: false}
      - {label: "Źródła (APA)", name: "sources", widget: "sources-editor", required: false}
      - {label: "Treść", name: "body", widget: "markdown"}

  # Editions - groups of posts
  - name: "editions"
    label: "Wydania"
    folder: "content/wydania"
    create: true
    slug: "{{slug}}"
    summary: "{{date}} — {{title}}"
    sortable_fields: ["date", "title"]
    editor:
      preview: false
    fields:
      - {label: "Tytuł", name: "title", widget: "string", hint: "np.: 2026/wiosna"}
      - {label: "Data wydania", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss"}
      - {label: "Obrazek", name: "image", widget: "image", required: false}
      - label: "Artykuł główny wydania"
        name: "artykul_glowny"
        widget: "relation"
        collection: "posts"
        value_field: "{{slug}}"
        search_fields: ["title"]
        display_fields: ["title"]
        required: false

  # Pages (static pages like About, Contact)
  - name: "pages"
    label: "Strony"
    folder: "content/pages"
    create: true
    slug: "{{slug}}"
    editor:
      preview: true
    fields:
      - {label: "Tytuł", name: "title", widget: "string"}
      - {label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss"}
      - {label: "Wersja robocza", name: "draft", widget: "boolean", default: false}
      - {label: "Menu", name: "menu", widget: "string", required: false, hint: "np.: 'main' aby dodać do menu głównego"}
      - {label: "Treść", name: "body", widget: "markdown"}

  # Authors (profiles)
  - name: "authors"
    label: "Autorzy"
    folder: "content/autorzy"
    create: true
    slug: "{{slug}}"
    identifier_field: name
    editor:
      preview: false
    fields:
      - {label: "Imię i nazwisko", name: "name", widget: "string"}
      - {label: "Aktywny/-a", name: "is_active", widget: "boolean", default: true, hint: "Odznacz dla byłych współpracowników"}
      - {label: "Rola w redakcji", name: "role", widget: "string", required: false, hint: "np.: Redaktor naczelna, Publicysta"}
      - {label: "Kolejność", name: "weight", widget: "number", value_type: "int", default: 1, hint: "Niższy numer = wyżej na liście"}
      - {label: "Rok urodzenia", name: "birth_year", widget: "number", value_type: "int", required: false}
      - {label: "Bio", name: "bio", widget: "text", required: false}
      - {label: "Zdjęcie", name: "photo", widget: "image", required: false}
      - {label: "Email", name: "email", widget: "string", required: false}
      - {label: "Social media", name: "social", widget: "object", required: false, fields: [
          {label: "Twitter", name: "twitter", widget: "string", required: false},
          {label: "GitHub", name: "github", widget: "string", required: false},
          {label: "LinkedIn", name: "linkedin", widget: "string", required: false}
        ]}
