{{ define "main" }}
{{ if .Pages }}
<div class="articles-grid">
    {{ range $cardIndex, $page := .Pages }}
        {{ $loadingPriority := cond (eq $cardIndex 0) "high" "" }}
        {{ partial "post-card.html" (dict "page" $page "loadingPriority" $loadingPriority) }}
    {{ end }}
</div>
{{ else }}
<p class="no-posts">Brak artykułów w tej sekcji.</p>
{{ end }}
{{ end }}
