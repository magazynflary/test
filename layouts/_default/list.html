{{ define "main" }}
<h1 class="page-title">{{ index .Site.Params.sectionTitles .Section | default .Title }}</h1>

{{ if .Pages }}
<div class="posts-grid">
    {{ range .Pages }}
    {{ partial "post-card.html" . }}
    {{ end }}
</div>
{{ else }}
<p class="no-posts">Brak artykułów w tej sekcji.</p>
{{ end }}
{{ end }}
