{{ define "main" }}
<h1 class="page-title">{{ .Title }}</h1>

{{ if .Data.Terms }}
<div class="tags-list">
    {{ range .Data.Terms.ByCount }}
    <a href="{{ .Page.Permalink }}" class="tag tag--lg">{{ .Page.Title }} ({{ .Count }})</a>
    {{ end }}
</div>
{{ else }}
<p class="no-posts">Brak tagów.</p>
{{ end }}
{{ end }}
