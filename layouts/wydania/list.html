{{ define "main" }}
{{ if .Pages }}
<div class="editions-list">
    {{ range .Pages }}
    <article class="post-card edition-card">
        <a href="{{ .Permalink }}" class="post-card__link">
            <div class="post-card__image-wrapper">
                {{ partial "banner-image.html" (dict "page" . "class" "post-card__image" "sizes" "100vw") }}
            </div>
            <div class="edition-card__title-bar">
                {{ with .Params.issue }}<span class="post-card__issue">{{ . }}</span>{{ end }}
                <h3 class="post-card__title">{{ .Title }}</h3>
            </div>
        </a>
    </article>
    {{ end }}
</div>
{{ else }}
<p class="no-posts">Brak artykułów w tej sekcji.</p>
{{ end }}
{{ end }}
