<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Kompresja obrazków</title>
  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 60px auto; padding: 0 16px; }
    table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
    th { text-align: left; border-bottom: 2px solid #ccc; padding: 6px 8px; }
    td { padding: 6px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
    .ok   { color: green; }
    .skip { color: #999; }
    button { padding: 10px 24px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #download-all { display: none; }
    progress { width: 100%; margin: 12px 0; display: none; }
  </style>
</head>
<body>
  <h2>Kompresja obrazków</h2>
  <p>Wybierz pliki (możesz zaznaczyć wiele):</p>
  <input type="file" id="files" accept="image/*" multiple>
  <progress id="progress" max="100" value="0"></progress>
  <table id="results" style="display:none">
    <thead><tr><th>Plik</th><th>Przed</th><th>Po</th><th>Zmiana</th></tr></thead>
    <tbody></tbody>
  </table>
  <button id="download-all">Pobierz ZIP</button>

  <script>
    var MAX_MB  = 0.5;
    var MAX_PX  = 2000;
    var QUALITY = 0.85;

    var compressedFiles = {};

    document.getElementById('files').addEventListener('change', async function() {
      var files = Array.from(this.files);
      if (!files.length) return;

      var resultsBody = document.querySelector('#results tbody');
      resultsBody.innerHTML = '';
      compressedFiles = {};
      document.getElementById('results').style.display = 'table';
      document.getElementById('download-all').style.display = 'none';

      var progressBar = document.getElementById('progress');
      progressBar.style.display = 'block';
      progressBar.value = 0;

      for (var i = 0; i < files.length; i++) {
        var file = files[i];
        var compressedFile, savingsMarkup;

        if (file.size / 1024 / 1024 > MAX_MB) {
          compressedFile = await imageCompression(file, {
            maxSizeMB: MAX_MB,
            maxWidthOrHeight: MAX_PX,
            initialQuality: QUALITY,
            useWebWorker: true,
          });
          savingsMarkup = '<span class="ok">−' + (100 - Math.round(compressedFile.size / file.size * 100)) + '%</span>';
        } else {
          compressedFile = file;
          savingsMarkup = '<span class="skip">pominięto</span>';
        }

        compressedFiles[file.name] = compressedFile;

        var resultRow = document.createElement('tr');
        var nameCell = document.createElement('td');
        nameCell.textContent = file.name;
        resultRow.appendChild(nameCell);
        resultRow.insertAdjacentHTML('beforeend',
          '<td>' + formatKilobytes(file.size) + '</td>' +
          '<td>' + formatKilobytes(compressedFile.size) + '</td>' +
          '<td>' + savingsMarkup + '</td>');
        resultsBody.appendChild(resultRow);

        progressBar.value = Math.round((i + 1) / files.length * 100);
      }

      progressBar.style.display = 'none';
      document.getElementById('download-all').style.display = 'inline-block';
    });

    document.getElementById('download-all').addEventListener('click', async function() {
      var zip = new JSZip();
      for (var filename in compressedFiles) {
        zip.file(filename, await compressedFiles[filename].arrayBuffer());
      }
      var zipBlob = await zip.generateAsync({ type: 'blob' });
      var downloadLink = document.createElement('a');
      downloadLink.href = URL.createObjectURL(zipBlob);
      downloadLink.download = 'compressed.zip';
      downloadLink.click();
    });

    function formatKilobytes(bytes) { return (bytes / 1024).toFixed(0) + ' KB'; }
  </script>
</body>
</html>
